<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebChuGL Sync Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4ff; }
        .container { display: flex; gap: 20px; }
        .panel {
            flex: 1;
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
        }
        button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover { background: #00a8cc; }
        button:disabled { background: #444; color: #888; }
        canvas {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 4px;
        }
        #log {
            background: #0f0f23;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            border-radius: 4px;
        }
        .log { color: #888; }
        .cmd { color: #4f4; }
        .frame { color: #ff4; }
        .error { color: #f44; }
        #stats {
            font-family: monospace;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>WebChuGL Sync Test</h1>
    <p>Tests command passing from Audio Worklet to Main Thread renderer.</p>

    <div>
        <button id="startBtn">Start</button>
        <button id="stopBtn" disabled>Stop</button>
    </div>

    <div id="stats">Frame: 0 | Commands: 0 | Audio Time: 0.00s</div>

    <div class="container">
        <div class="panel">
            <h3>Canvas (Main Thread)</h3>
            <canvas id="canvas"></canvas>
        </div>
        <div class="panel">
            <h3>Log</h3>
            <div id="log"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('log');
        const statsEl = document.getElementById('stats');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        // Resize canvas
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        let audioContext = null;
        let chuckNode = null;
        let syncBuffer = null;
        let frameCount = 0;
        let commandCount = 0;
        let running = false;

        // Scene state (updated by commands from worklet)
        const scene = {
            objects: [],
            backgroundColor: [0, 0, 0],
            time: 0
        };

        function log(msg, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] ${msg}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
            // Keep only last 100 lines
            while (logEl.children.length > 100) {
                logEl.removeChild(logEl.firstChild);
            }
        }

        // Process commands from audio worklet
        function processCommands(commands) {
            for (const cmd of commands) {
                commandCount++;
                switch (cmd.type) {
                    case 'setBackgroundColor':
                        scene.backgroundColor = cmd.color;
                        break;
                    case 'createCircle':
                        scene.objects.push({
                            type: 'circle',
                            id: cmd.id,
                            x: cmd.x,
                            y: cmd.y,
                            radius: cmd.radius,
                            color: cmd.color
                        });
                        log(`Created circle ${cmd.id}`, 'cmd');
                        break;
                    case 'updateCircle':
                        const obj = scene.objects.find(o => o.id === cmd.id);
                        if (obj) {
                            if (cmd.x !== undefined) obj.x = cmd.x;
                            if (cmd.y !== undefined) obj.y = cmd.y;
                            if (cmd.radius !== undefined) obj.radius = cmd.radius;
                            if (cmd.color !== undefined) obj.color = cmd.color;
                        }
                        break;
                    case 'clear':
                        scene.objects = [];
                        break;
                    default:
                        log(`Unknown command: ${cmd.type}`, 'error');
                }
            }
        }

        // Render the scene
        function render() {
            const [r, g, b] = scene.backgroundColor;
            ctx.fillStyle = `rgb(${r * 255}, ${g * 255}, ${b * 255})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (const obj of scene.objects) {
                if (obj.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(
                        obj.x * canvas.width,
                        obj.y * canvas.height,
                        obj.radius * Math.min(canvas.width, canvas.height),
                        0, Math.PI * 2
                    );
                    const [r, g, b] = obj.color;
                    ctx.fillStyle = `rgb(${r * 255}, ${g * 255}, ${b * 255})`;
                    ctx.fill();
                }
            }

            frameCount++;
        }

        // Main render loop
        function renderLoop() {
            if (!running) return;

            // Check for commands from audio worklet
            if (chuckNode) {
                // Commands come via message, render what we have
                render();
            }

            // Update stats
            const audioTime = audioContext ? audioContext.currentTime : 0;
            statsEl.textContent = `Frame: ${frameCount} | Commands: ${commandCount} | Audio Time: ${audioTime.toFixed(2)}s`;

            requestAnimationFrame(renderLoop);
        }

        async function start() {
            try {
                log('Starting...');

                // Create AudioContext
                audioContext = new AudioContext({ sampleRate: 48000 });
                log(`AudioContext created, sample rate: ${audioContext.sampleRate}`);

                // Create SharedArrayBuffer for sync (requires COOP/COEP headers)
                try {
                    syncBuffer = new SharedArrayBuffer(16);
                    log('SharedArrayBuffer created (sync enabled)');
                } catch (e) {
                    log('SharedArrayBuffer not available - sync disabled', 'error');
                    log('Server needs COOP/COEP headers for full sync', 'error');
                    syncBuffer = null;
                }

                // Load audio worklet
                log('Loading audio worklet...');
                await audioContext.audioWorklet.addModule('chuck_worklet.js');

                // Create node
                chuckNode = new AudioWorkletNode(audioContext, 'chuck-processor', {
                    numberOfInputs: 0,
                    numberOfOutputs: 1,
                    outputChannelCount: [2],
                    processorOptions: {
                        sampleRate: audioContext.sampleRate,
                        numChannels: 2,
                        syncBuffer: syncBuffer
                    }
                });

                // Handle messages from worklet
                chuckNode.port.onmessage = (event) => {
                    const msg = event.data;
                    switch (msg.type) {
                        case 'ready':
                            log('ChucK ready!', 'cmd');
                            // Run test code
                            runTestCode();
                            break;
                        case 'print':
                            log(`ChucK: ${msg.text}`, 'cmd');
                            break;
                        case 'printErr':
                            log(`ChucK Error: ${msg.text}`, 'error');
                            break;
                        case 'commands':
                            // Process graphics commands
                            processCommands(msg.commands);
                            log(`Received ${msg.commands.length} commands`, 'frame');
                            break;
                        case 'frame':
                            // Frame sync from worklet
                            log(`Frame ${msg.frameNum}`, 'frame');
                            break;
                        case 'error':
                            log(`Error: ${msg.message}`, 'error');
                            break;
                    }
                };

                chuckNode.connect(audioContext.destination);

                running = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;

                // Start render loop
                renderLoop();

                log('Started!', 'cmd');

            } catch (err) {
                log(`Error: ${err.message}`, 'error');
                console.error(err);
            }
        }

        function runTestCode() {
            // This ChucK code won't actually generate graphics commands yet
            // (ChuGL not integrated into audio WASM)
            // But we can test audio + message passing
            const code = `
// Test audio
SinOsc osc => dac;
0.2 => osc.gain;

// Frequency sweep
for (int i; i < 100; i++) {
    220 + i * 5 => osc.freq;
    <<< "freq:", osc.freq() >>>;
    50::ms => now;
}

<<< "Done!" >>>;
`;
            log('Running test code...');
            chuckNode.port.postMessage({ type: 'run', code: code });

            // Simulate graphics commands (since ChuGL not in audio WASM yet)
            simulateGraphicsCommands();
        }

        // Simulate what ChuGL would send
        function simulateGraphicsCommands() {
            let frame = 0;
            const interval = setInterval(() => {
                if (!running) {
                    clearInterval(interval);
                    return;
                }

                const t = frame * 0.05;
                const commands = [
                    {
                        type: 'setBackgroundColor',
                        color: [0.1, 0.1, 0.2 + Math.sin(t) * 0.1]
                    }
                ];

                // Create circles on first frame
                if (frame === 0) {
                    for (let i = 0; i < 5; i++) {
                        commands.push({
                            type: 'createCircle',
                            id: i,
                            x: 0.5,
                            y: 0.5,
                            radius: 0.05 + i * 0.03,
                            color: [
                                Math.sin(i * 0.5) * 0.5 + 0.5,
                                Math.cos(i * 0.7) * 0.5 + 0.5,
                                Math.sin(i * 0.3) * 0.5 + 0.5
                            ]
                        });
                    }
                }

                // Update circles
                for (let i = 0; i < 5; i++) {
                    commands.push({
                        type: 'updateCircle',
                        id: i,
                        x: 0.5 + Math.sin(t + i * 0.5) * 0.3,
                        y: 0.5 + Math.cos(t * 0.7 + i * 0.3) * 0.3
                    });
                }

                processCommands(commands);
                frame++;
            }, 1000 / 60);
        }

        function stop() {
            running = false;
            if (chuckNode) {
                chuckNode.disconnect();
                chuckNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
            log('Stopped');
        }

        startBtn.addEventListener('click', start);
        stopBtn.addEventListener('click', stop);

        log('Ready. Click Start to begin.');
        log('Note: Full sync requires COOP/COEP headers.');
    </script>
</body>
</html>
