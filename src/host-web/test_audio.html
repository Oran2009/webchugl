<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebChuGL Audio Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4ff; }
        button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover { background: #00a8cc; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        textarea {
            width: 100%;
            height: 200px;
            background: #16213e;
            color: #0f0;
            border: 1px solid #00d4ff;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
        }
        #output {
            background: #0f0f23;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            border: 1px solid #333;
        }
        .log { color: #888; }
        .error { color: #f44; }
        .success { color: #4f4; }
    </style>
</head>
<body>
    <h1>WebChuGL Audio Test</h1>
    <p>Test ChucK audio running in an Audio Worklet.</p>

    <div>
        <button id="startBtn">Start Audio</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="runBtn" disabled>Run Code</button>
    </div>

    <h3>ChucK Code</h3>
    <textarea id="code">// Simple sine wave test
SinOsc osc => dac;
440 => osc.freq;
0.5 => osc.gain;

<<< "Playing 440Hz sine wave..." >>>;

// Play for 2 seconds
2::second => now;

<<< "Done!" >>>;
</textarea>

    <h3>Output</h3>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const runBtn = document.getElementById('runBtn');
        const codeArea = document.getElementById('code');

        let audioContext = null;
        let chuckNode = null;

        function log(msg, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        async function startAudio() {
            try {
                log('Creating AudioContext...');
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 48000
                });

                log(`Sample rate: ${audioContext.sampleRate}`);

                // Load the audio WASM module
                log('Loading ChucK WASM module...');
                const wasmResponse = await fetch('webchugl_audio.js');
                if (!wasmResponse.ok) {
                    throw new Error('Failed to load webchugl_audio.js - did you build it?');
                }

                // For Audio Worklet, we need to load the module differently
                // The processor loads the WASM itself
                log('Registering Audio Worklet...');
                await audioContext.audioWorklet.addModule('chuck_processor.js');

                // Load WASM binary to send to worklet
                const wasmBinaryResponse = await fetch('webchugl_audio.wasm');
                const wasmBinary = await wasmBinaryResponse.arrayBuffer();

                log('Creating ChucK processor node...');
                chuckNode = new AudioWorkletNode(audioContext, 'chuck-processor', {
                    numberOfInputs: 0,
                    numberOfOutputs: 1,
                    outputChannelCount: [2],
                    processorOptions: {
                        srate: audioContext.sampleRate,
                        numOutChannels: 2,
                        wasmBinary: wasmBinary
                    }
                });

                // Handle messages from worklet
                chuckNode.port.onmessage = (event) => {
                    const msg = event.data;
                    switch (msg.type) {
                        case 'print':
                            log(msg.text, 'success');
                            break;
                        case 'printErr':
                            log(msg.text, 'error');
                            break;
                        case 'ready':
                            log('ChucK is ready!', 'success');
                            runBtn.disabled = false;
                            break;
                        case 'error':
                            log('Error: ' + msg.message, 'error');
                            break;
                        case 'runComplete':
                            log(`Code execution: ${msg.success ? 'success' : 'failed'}`, msg.success ? 'success' : 'error');
                            break;
                    }
                };

                // Connect to destination
                chuckNode.connect(audioContext.destination);

                log('Audio started!', 'success');
                startBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (err) {
                log('Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        function stopAudio() {
            if (chuckNode) {
                chuckNode.disconnect();
                chuckNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            log('Audio stopped');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            runBtn.disabled = true;
        }

        function runCode() {
            if (!chuckNode) {
                log('Audio not started', 'error');
                return;
            }
            const code = codeArea.value;
            log('Running code...');
            chuckNode.port.postMessage({ type: 'run', code: code });
        }

        startBtn.addEventListener('click', startAudio);
        stopBtn.addEventListener('click', stopAudio);
        runBtn.addEventListener('click', runCode);

        log('Ready. Click "Start Audio" to begin.');
        log('Note: You need to build webchugl_audio.wasm first.');
    </script>
</body>
</html>
