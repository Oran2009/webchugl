<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebChuGL Audio + Graphics Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4ff; margin-bottom: 10px; }
        .container { display: flex; gap: 20px; }
        .panel {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
        }
        .panel-wide { flex: 2; }
        .panel-narrow { flex: 1; }
        button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover { background: #00a8cc; }
        button:disabled { background: #444; color: #888; }
        canvas {
            width: 100%;
            height: 400px;
            background: #000;
            border-radius: 4px;
        }
        #log {
            background: #0f0f23;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            border-radius: 4px;
        }
        .log { color: #888; }
        .cmd { color: #4f4; }
        .gfx { color: #ff4; }
        .error { color: #f44; }
        #stats {
            font-family: monospace;
            font-size: 12px;
            color: #888;
            margin: 10px 0;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #0f0f23;
            color: #0f0;
            border: 1px solid #00d4ff;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>WebChuGL Audio + Graphics Test</h1>
    <p>Demonstrates graphics commands from Audio Worklet to Main Thread.</p>

    <div>
        <button id="startBtn">Start</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="runBtn" disabled>Run ChucK</button>
        <button id="demoBtn" disabled>Run Graphics Demo</button>
    </div>

    <div id="stats">Waiting to start...</div>

    <div class="container">
        <div class="panel panel-wide">
            <h3>Canvas (Main Thread Rendering)</h3>
            <canvas id="canvas"></canvas>
        </div>
        <div class="panel panel-narrow">
            <h3>ChucK Code</h3>
            <textarea id="code">// Audio + tempo
SinOsc osc => dac;
0.2 => osc.gain;

// Tempo-synced notes
[60, 62, 64, 65, 67, 69, 71, 72] @=> int notes[];

for (int i; i < 32; i++) {
    Std.mtof(notes[i % notes.size()]) => osc.freq;
    <<< "Note:", notes[i % notes.size()] >>>;
    125::ms => now;
}
<<< "Done!" >>>;
</textarea>
            <h3>Log</h3>
            <div id="log"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('log');
        const statsEl = document.getElementById('stats');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const runBtn = document.getElementById('runBtn');
        const demoBtn = document.getElementById('demoBtn');
        const codeArea = document.getElementById('code');

        // Resize canvas
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let audioContext = null;
        let chuckNode = null;
        let running = false;
        let frameCount = 0;
        let commandCount = 0;
        let gfxDemoInterval = null;

        // Scene objects (updated by commands from worklet)
        const objects = new Map();
        let backgroundColor = [0, 0, 0.1];

        // Command types (must match webchugl_gfx.cpp)
        const CMD = {
            NONE: 0,
            CREATE_CIRCLE: 1,
            CREATE_BOX: 2,
            UPDATE_POSITION: 3,
            UPDATE_SCALE: 4,
            UPDATE_ROTATION: 5,
            UPDATE_COLOR: 6,
            SET_BACKGROUND: 7,
            DELETE_OBJECT: 8,
            CLEAR_SCENE: 9,
        };

        function log(msg, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
            while (logEl.children.length > 100) {
                logEl.removeChild(logEl.firstChild);
            }
        }

        // Parse binary command buffer
        function parseCommands(buffer) {
            const view = new DataView(buffer);
            let offset = 0;
            const commands = [];

            while (offset < buffer.byteLength) {
                const type = view.getUint8(offset);
                offset += 1;

                switch (type) {
                    case CMD.CREATE_CIRCLE: {
                        const id = view.getUint32(offset, true); offset += 4;
                        const x = view.getFloat32(offset, true); offset += 4;
                        const y = view.getFloat32(offset, true); offset += 4;
                        const radius = view.getFloat32(offset, true); offset += 4;
                        const r = view.getFloat32(offset, true); offset += 4;
                        const g = view.getFloat32(offset, true); offset += 4;
                        const b = view.getFloat32(offset, true); offset += 4;
                        commands.push({ type: 'createCircle', id, x, y, radius, color: [r, g, b] });
                        break;
                    }
                    case CMD.CREATE_BOX: {
                        const id = view.getUint32(offset, true); offset += 4;
                        const x = view.getFloat32(offset, true); offset += 4;
                        const y = view.getFloat32(offset, true); offset += 4;
                        const w = view.getFloat32(offset, true); offset += 4;
                        const h = view.getFloat32(offset, true); offset += 4;
                        const r = view.getFloat32(offset, true); offset += 4;
                        const g = view.getFloat32(offset, true); offset += 4;
                        const b = view.getFloat32(offset, true); offset += 4;
                        commands.push({ type: 'createBox', id, x, y, width: w, height: h, color: [r, g, b] });
                        break;
                    }
                    case CMD.UPDATE_POSITION: {
                        const id = view.getUint32(offset, true); offset += 4;
                        const x = view.getFloat32(offset, true); offset += 4;
                        const y = view.getFloat32(offset, true); offset += 4;
                        commands.push({ type: 'updatePosition', id, x, y });
                        break;
                    }
                    case CMD.UPDATE_SCALE: {
                        const id = view.getUint32(offset, true); offset += 4;
                        const sx = view.getFloat32(offset, true); offset += 4;
                        const sy = view.getFloat32(offset, true); offset += 4;
                        commands.push({ type: 'updateScale', id, sx, sy });
                        break;
                    }
                    case CMD.UPDATE_ROTATION: {
                        const id = view.getUint32(offset, true); offset += 4;
                        const angle = view.getFloat32(offset, true); offset += 4;
                        commands.push({ type: 'updateRotation', id, angle });
                        break;
                    }
                    case CMD.UPDATE_COLOR: {
                        const id = view.getUint32(offset, true); offset += 4;
                        const r = view.getFloat32(offset, true); offset += 4;
                        const g = view.getFloat32(offset, true); offset += 4;
                        const b = view.getFloat32(offset, true); offset += 4;
                        commands.push({ type: 'updateColor', id, color: [r, g, b] });
                        break;
                    }
                    case CMD.SET_BACKGROUND: {
                        const r = view.getFloat32(offset, true); offset += 4;
                        const g = view.getFloat32(offset, true); offset += 4;
                        const b = view.getFloat32(offset, true); offset += 4;
                        commands.push({ type: 'setBackground', color: [r, g, b] });
                        break;
                    }
                    case CMD.DELETE_OBJECT: {
                        const id = view.getUint32(offset, true); offset += 4;
                        commands.push({ type: 'deleteObject', id });
                        break;
                    }
                    case CMD.CLEAR_SCENE: {
                        commands.push({ type: 'clearScene' });
                        break;
                    }
                    default:
                        log(`Unknown command type: ${type}`, 'error');
                        return commands;
                }
            }
            return commands;
        }

        // Execute parsed commands
        function executeCommands(commands) {
            for (const cmd of commands) {
                commandCount++;
                switch (cmd.type) {
                    case 'createCircle':
                        objects.set(cmd.id, {
                            type: 'circle',
                            x: cmd.x, y: cmd.y,
                            radius: cmd.radius,
                            color: cmd.color,
                            scale: [1, 1],
                            rotation: 0
                        });
                        break;
                    case 'createBox':
                        objects.set(cmd.id, {
                            type: 'box',
                            x: cmd.x, y: cmd.y,
                            width: cmd.width, height: cmd.height,
                            color: cmd.color,
                            scale: [1, 1],
                            rotation: 0
                        });
                        break;
                    case 'updatePosition':
                        if (objects.has(cmd.id)) {
                            const obj = objects.get(cmd.id);
                            obj.x = cmd.x;
                            obj.y = cmd.y;
                        }
                        break;
                    case 'updateScale':
                        if (objects.has(cmd.id)) {
                            const obj = objects.get(cmd.id);
                            obj.scale = [cmd.sx, cmd.sy];
                        }
                        break;
                    case 'updateRotation':
                        if (objects.has(cmd.id)) {
                            objects.get(cmd.id).rotation = cmd.angle;
                        }
                        break;
                    case 'updateColor':
                        if (objects.has(cmd.id)) {
                            objects.get(cmd.id).color = cmd.color;
                        }
                        break;
                    case 'setBackground':
                        backgroundColor = cmd.color;
                        break;
                    case 'deleteObject':
                        objects.delete(cmd.id);
                        break;
                    case 'clearScene':
                        objects.clear();
                        break;
                }
            }
        }

        // Render the scene
        function render() {
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;

            // Clear with background color
            const [br, bg, bb] = backgroundColor;
            ctx.fillStyle = `rgb(${br * 255}, ${bg * 255}, ${bb * 255})`;
            ctx.fillRect(0, 0, w, h);

            // Draw objects
            for (const [id, obj] of objects) {
                ctx.save();
                ctx.translate(obj.x * w, obj.y * h);
                ctx.rotate(obj.rotation);
                ctx.scale(obj.scale[0], obj.scale[1]);

                const [r, g, b] = obj.color;
                ctx.fillStyle = `rgb(${r * 255}, ${g * 255}, ${b * 255})`;

                if (obj.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, obj.radius * Math.min(w, h), 0, Math.PI * 2);
                    ctx.fill();
                } else if (obj.type === 'box') {
                    const bw = obj.width * w;
                    const bh = obj.height * h;
                    ctx.fillRect(-bw/2, -bh/2, bw, bh);
                }
                ctx.restore();
            }

            frameCount++;
        }

        // Render loop
        function renderLoop() {
            if (!running) return;
            render();
            const audioTime = audioContext ? audioContext.currentTime.toFixed(2) : '0.00';
            statsEl.textContent = `Frame: ${frameCount} | Commands: ${commandCount} | Objects: ${objects.size} | Audio: ${audioTime}s`;
            requestAnimationFrame(renderLoop);
        }

        async function start() {
            try {
                log('Starting...');
                audioContext = new AudioContext({ sampleRate: 48000 });
                log(`AudioContext: ${audioContext.sampleRate}Hz`);

                log('Loading audio worklet...');
                await audioContext.audioWorklet.addModule('chuck_worklet.js');

                chuckNode = new AudioWorkletNode(audioContext, 'chuck-processor', {
                    numberOfInputs: 0,
                    numberOfOutputs: 1,
                    outputChannelCount: [2],
                    processorOptions: {
                        sampleRate: audioContext.sampleRate,
                        numChannels: 2
                    }
                });

                chuckNode.port.onmessage = (event) => {
                    const msg = event.data;
                    switch (msg.type) {
                        case 'ready':
                            log('ChucK ready!', 'cmd');
                            runBtn.disabled = false;
                            demoBtn.disabled = false;
                            break;
                        case 'print':
                            log(`ChucK: ${msg.text}`, 'cmd');
                            break;
                        case 'printErr':
                            log(`ChucK Error: ${msg.text}`, 'error');
                            break;
                        case 'gfxCommands':
                            // Received binary graphics commands
                            const commands = parseCommands(msg.commands);
                            if (commands.length > 0) {
                                executeCommands(commands);
                                log(`Frame ${msg.frame}: ${commands.length} cmds`, 'gfx');
                            }
                            break;
                        case 'error':
                            log(`Error: ${msg.message}`, 'error');
                            break;
                    }
                };

                chuckNode.connect(audioContext.destination);

                running = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                renderLoop();
                log('Started!', 'cmd');

            } catch (err) {
                log(`Error: ${err.message}`, 'error');
                console.error(err);
            }
        }

        function stop() {
            running = false;
            if (gfxDemoInterval) {
                clearInterval(gfxDemoInterval);
                gfxDemoInterval = null;
            }
            if (chuckNode) {
                chuckNode.disconnect();
                chuckNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
            runBtn.disabled = true;
            demoBtn.disabled = true;
            log('Stopped');
        }

        function runChuck() {
            if (!chuckNode) return;
            const code = codeArea.value;
            log('Running ChucK code...');
            chuckNode.port.postMessage({ type: 'run', code });
        }

        // Demo: Call graphics API from main thread (via worklet message)
        // This simulates what would happen if ChucK called the graphics API
        function runGraphicsDemo() {
            if (!chuckNode) return;
            log('Running graphics demo (JS-driven)...', 'gfx');

            // Since ChucK can't call gfx_* directly yet, we simulate by
            // sending commands to the worklet which then sends them back
            // For now, we'll just generate commands on main thread

            let t = 0;
            objects.clear();

            // Create some circles
            for (let i = 0; i < 8; i++) {
                objects.set(i + 1, {
                    type: 'circle',
                    x: 0.5, y: 0.5,
                    radius: 0.02 + i * 0.015,
                    color: [
                        Math.sin(i * 0.5) * 0.5 + 0.5,
                        Math.cos(i * 0.7) * 0.5 + 0.5,
                        Math.sin(i * 0.3 + 1) * 0.5 + 0.5
                    ],
                    scale: [1, 1],
                    rotation: 0
                });
            }

            gfxDemoInterval = setInterval(() => {
                if (!running) {
                    clearInterval(gfxDemoInterval);
                    return;
                }
                t += 0.03;
                backgroundColor = [0.1, 0.1, 0.15 + Math.sin(t * 0.5) * 0.05];

                for (let i = 0; i < 8; i++) {
                    const obj = objects.get(i + 1);
                    if (obj) {
                        obj.x = 0.5 + Math.sin(t + i * 0.5) * 0.3;
                        obj.y = 0.5 + Math.cos(t * 0.7 + i * 0.3) * 0.25;
                        obj.rotation = t * (i % 2 === 0 ? 1 : -1);
                    }
                }
            }, 16);
        }

        startBtn.addEventListener('click', start);
        stopBtn.addEventListener('click', stop);
        runBtn.addEventListener('click', runChuck);
        demoBtn.addEventListener('click', runGraphicsDemo);

        log('Ready. Click Start to begin.');
    </script>
</body>
</html>
