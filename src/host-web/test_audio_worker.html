<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebChuGL Audio Test (Web Worker)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d4ff; }
        button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover { background: #00a8cc; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        textarea {
            width: 100%;
            height: 200px;
            background: #16213e;
            color: #0f0;
            border: 1px solid #00d4ff;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
        }
        #output {
            background: #0f0f23;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            border: 1px solid #333;
        }
        .log { color: #888; }
        .error { color: #f44; }
        .success { color: #4f4; }
    </style>
</head>
<body>
    <h1>WebChuGL Audio Test (Web Worker)</h1>
    <p>Test ChucK audio running in a Web Worker with ScriptProcessorNode.</p>

    <div>
        <button id="startBtn">Start Audio</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="runBtn" disabled>Run Code</button>
    </div>

    <h3>ChucK Code</h3>
    <textarea id="code">// Simple sine wave test
SinOsc osc => dac;
440 => osc.freq;
0.5 => osc.gain;

<<< "Playing 440Hz sine wave..." >>>;

// Play for 2 seconds
2::second => now;

<<< "Done!" >>>;
</textarea>

    <h3>Output</h3>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const runBtn = document.getElementById('runBtn');
        const codeArea = document.getElementById('code');

        let audioContext = null;
        let scriptNode = null;
        let chuckWorker = null;
        let isChuckReady = false;

        // Ring buffer for audio samples from worker
        const RING_BUFFER_SIZE = 16384;
        let ringBuffer = new Float32Array(RING_BUFFER_SIZE * 2); // stereo
        let writePos = 0;
        let readPos = 0;
        let pendingRequests = 0;
        const MAX_PENDING = 4;

        function log(msg, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function getAvailableSamples() {
            let available = writePos - readPos;
            if (available < 0) available += RING_BUFFER_SIZE;
            return available;
        }

        async function startAudio() {
            try {
                log('Creating AudioContext...');
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 48000
                });

                log(`Sample rate: ${audioContext.sampleRate}`);

                // Create Web Worker
                log('Creating ChucK worker...');
                chuckWorker = new Worker('chuck_worker.js');

                // Handle messages from worker
                chuckWorker.onmessage = (event) => {
                    const msg = event.data;
                    switch (msg.type) {
                        case 'workerReady':
                            log('Worker loaded, initializing ChucK...');
                            chuckWorker.postMessage({
                                type: 'init',
                                srate: audioContext.sampleRate,
                                numChannels: 2
                            });
                            break;

                        case 'ready':
                            log('ChucK is ready!', 'success');
                            isChuckReady = true;
                            runBtn.disabled = false;
                            // Start requesting audio
                            requestMoreAudio();
                            break;

                        case 'print':
                            log(msg.text, 'success');
                            break;

                        case 'printErr':
                            log(msg.text, 'error');
                            break;

                        case 'error':
                            log('Error: ' + msg.message, 'error');
                            break;

                        case 'runComplete':
                            log(`Code execution: ${msg.success ? 'success' : 'failed'}`, msg.success ? 'success' : 'error');
                            break;

                        case 'audio':
                            // Received audio samples from worker
                            pendingRequests--;
                            const samples = new Float32Array(msg.samples);
                            const numFrames = samples.length / 2;

                            // Write to ring buffer (interleaved stereo)
                            for (let i = 0; i < samples.length; i++) {
                                ringBuffer[(writePos * 2 + i) % (RING_BUFFER_SIZE * 2)] = samples[i];
                            }
                            writePos = (writePos + numFrames) % RING_BUFFER_SIZE;

                            // Request more audio if needed
                            requestMoreAudio();
                            break;
                    }
                };

                chuckWorker.onerror = (err) => {
                    log('Worker error: ' + err.message, 'error');
                    console.error(err);
                };

                // Create ScriptProcessorNode (deprecated but works everywhere)
                const bufferSize = 1024;
                scriptNode = audioContext.createScriptProcessor(bufferSize, 0, 2);

                scriptNode.onaudioprocess = (event) => {
                    const outputL = event.outputBuffer.getChannelData(0);
                    const outputR = event.outputBuffer.getChannelData(1);
                    const numFrames = outputL.length;

                    const available = getAvailableSamples();

                    if (available >= numFrames) {
                        // Read from ring buffer (interleaved)
                        for (let i = 0; i < numFrames; i++) {
                            const idx = ((readPos + i) % RING_BUFFER_SIZE) * 2;
                            outputL[i] = ringBuffer[idx];
                            outputR[i] = ringBuffer[idx + 1];
                        }
                        readPos = (readPos + numFrames) % RING_BUFFER_SIZE;
                    } else {
                        // Underrun - output silence
                        for (let i = 0; i < numFrames; i++) {
                            outputL[i] = 0;
                            outputR[i] = 0;
                        }
                    }

                    // Request more audio
                    requestMoreAudio();
                };

                scriptNode.connect(audioContext.destination);

                log('Audio started!', 'success');
                startBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (err) {
                log('Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        function requestMoreAudio() {
            if (!isChuckReady || !chuckWorker) return;

            // Keep some requests in flight
            while (pendingRequests < MAX_PENDING && getAvailableSamples() < RING_BUFFER_SIZE / 2) {
                pendingRequests++;
                chuckWorker.postMessage({
                    type: 'process',
                    numFrames: 512, // Process in chunks
                    requestId: Date.now()
                });
            }
        }

        function stopAudio() {
            if (scriptNode) {
                scriptNode.disconnect();
                scriptNode = null;
            }
            if (chuckWorker) {
                chuckWorker.terminate();
                chuckWorker = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            isChuckReady = false;
            writePos = 0;
            readPos = 0;
            pendingRequests = 0;
            log('Audio stopped');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            runBtn.disabled = true;
        }

        function runCode() {
            if (!chuckWorker || !isChuckReady) {
                log('ChucK not ready', 'error');
                return;
            }
            const code = codeArea.value;
            log('Running code...');
            chuckWorker.postMessage({ type: 'run', code: code });
        }

        startBtn.addEventListener('click', startAudio);
        stopBtn.addEventListener('click', stopAudio);
        runBtn.addEventListener('click', runCode);

        log('Ready. Click "Start Audio" to begin.');
        log('This version uses Web Worker + ScriptProcessorNode.');
    </script>
</body>
</html>
