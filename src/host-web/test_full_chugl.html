<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebChuGL Full Integration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }
        #container {
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 350px;
            padding: 15px;
            background: #16213e;
            overflow-y: auto;
            flex-shrink: 0;
        }
        #canvas-container {
            flex: 1;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        h2 { color: #00d4ff; margin-bottom: 10px; font-size: 18px; }
        button {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            margin: 3px;
        }
        button:hover { background: #00a8cc; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        textarea {
            width: 100%;
            height: 200px;
            background: #0f0f23;
            color: #0f0;
            border: 1px solid #333;
            padding: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            resize: vertical;
            margin-bottom: 10px;
        }
        #output {
            background: #0f0f23;
            padding: 8px;
            height: 150px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            border: 1px solid #333;
            margin-top: 10px;
        }
        .log { color: #888; }
        .error { color: #f44; }
        .success { color: #4f4; }
        .info { color: #4af; }
        #stats {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #00d4ff;
        }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <div id="container">
        <div id="sidebar">
            <h2>WebChuGL Audio Worklet</h2>
            <div>
                <button id="startBtn">Start Audio</button>
                <button id="stopBtn" disabled>Stop</button>
                <button id="runBtn" disabled>Run Code</button>
            </div>

            <h2 style="margin-top: 15px;">ChucK + ChuGL Code</h2>
            <textarea id="code">// ChuGL Animation with Audio
SinOsc osc => dac;
0.2 => osc.gain;

// Create shapes
GCircle circle --> GG.scene();
GCircle circle2 --> GG.scene();

// Animation loop
float t;
while (true) {
    // Audio: frequency follows animation
    220 + 110 * Math.sin(t) => osc.freq;

    // Animate first circle
    Math.sin(t) * 0.5 => circle.posX;
    Math.cos(t * 0.7) * 0.3 => circle.posY;
    @(0.5 + 0.5*Math.sin(t*2), 0.3, 0.8) => circle.color;

    // Animate second circle
    Math.cos(t * 1.3) * 0.4 => circle2.posX;
    Math.sin(t * 0.9) * 0.4 => circle2.posY;
    @(0.8, 0.5 + 0.5*Math.cos(t*1.5), 0.3) => circle2.color;

    // Advance time
    GG.dt() +=> t;
    GG.nextFrame() => now;
}
</textarea>

            <div id="stats">Commands: 0 | Frames: 0</div>

            <h2 style="margin-top: 10px;">Output</h2>
            <div id="output"></div>
        </div>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="loading">
                <div>Loading WebChuGL Renderer...</div>
                <div style="font-size: 12px; margin-top: 10px;">Click "Start Audio" when ready</div>
            </div>
        </div>
    </div>

    <script>
        // Configure Module BEFORE loading index.js
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('webglcontextlost', function(e) {
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            print: function(text) {
                console.log('[WebChuGL]', text);
                var output = document.getElementById('output');
                if (output) {
                    var line = document.createElement('div');
                    line.className = 'success';
                    line.textContent = text;
                    output.appendChild(line);
                    output.scrollTop = output.scrollHeight;
                }
            },
            printErr: function(text) {
                console.error('[WebChuGL]', text);
            },
            setStatus: function(text) {
                var loading = document.getElementById('loading');
                if (loading) {
                    if (text) {
                        loading.innerHTML = '<div>' + text + '</div>';
                    } else {
                        loading.classList.add('hidden');
                    }
                }
            },
            onRuntimeInitialized: function() {
                console.log('[WebChuGL] Runtime initialized');
                var loading = document.getElementById('loading');
                if (loading) loading.classList.add('hidden');
            }
            // No preRun to fetch program.ck - this enables renderer-only mode
        };
    </script>

    <!-- Load the main WebChuGL module for rendering -->
    <script src="index.js"></script>

    <script>
        const output = document.getElementById('output');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const runBtn = document.getElementById('runBtn');
        const codeArea = document.getElementById('code');
        const canvas = document.getElementById('canvas');
        const statsEl = document.getElementById('stats');
        const loading = document.getElementById('loading');

        let audioContext = null;
        let chuckNode = null;
        let commandCount = 0;
        let frameCount = 0;

        // Main WebChuGL module (for rendering)
        let mainModule = Module; // Module is already defined above
        let injectCommands = null;

        function log(msg, type = 'log') {
            const line = document.createElement('div');
            line.className = type;
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] ${msg}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
            if (type === 'error') console.error(msg);
        }

        function updateStats() {
            statsEl.textContent = `Commands: ${commandCount} | Frames: ${frameCount}`;
        }

        // Initialize main WebChuGL module (wait for cwrap to be available)
        async function initMainModule() {
            try {
                log('Waiting for renderer module...', 'info');
                // Wait for cwrap to be available
                if (mainModule && mainModule.cwrap) {
                    injectCommands = mainModule.cwrap('webchugl_injectCommands', null, ['number', 'number']);
                    log('Main renderer ready - command injection enabled', 'success');
                } else if (mainModule) {
                    log('Module loaded but cwrap not ready yet, retrying...', 'info');
                    setTimeout(initMainModule, 500);
                } else {
                    log('Module not available, retrying...', 'info');
                    setTimeout(initMainModule, 500);
                }
            } catch (err) {
                log('Error initializing renderer: ' + err.message, 'error');
            }
        }

        async function startAudio() {
            try {
                log('Creating AudioContext...');
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 48000
                });

                log(`Sample rate: ${audioContext.sampleRate}`);

                // Load the audio worklet
                log('Loading Audio Worklet...');
                await audioContext.audioWorklet.addModule('chuck_worklet.js');
                log('Audio Worklet registered', 'success');

                // Create the ChucK processor node
                chuckNode = new AudioWorkletNode(audioContext, 'chuck-processor', {
                    numberOfInputs: 0,
                    numberOfOutputs: 1,
                    outputChannelCount: [2],
                    processorOptions: {
                        sampleRate: audioContext.sampleRate,
                        numChannels: 2
                    }
                });

                // Handle messages from worklet
                chuckNode.port.onmessage = (event) => {
                    const msg = event.data;
                    switch (msg.type) {
                        case 'print':
                            log(msg.text, 'success');
                            break;
                        case 'printErr':
                            log(msg.text, 'error');
                            break;
                        case 'ready':
                            log('ChucK + ChuGL ready!', 'success');
                            runBtn.disabled = false;
                            loading.classList.add('hidden');
                            break;
                        case 'error':
                            log('Error: ' + msg.message, 'error');
                            break;
                        case 'runComplete':
                            log(`Shred ${msg.shredId}: ${msg.success ? 'started' : 'failed'}`,
                                msg.success ? 'success' : 'error');
                            break;
                        case 'chuglCommands':
                            frameCount++;
                            commandCount += msg.commands.byteLength > 0 ? 1 : 0;
                            updateStats();

                            // If main module is available, inject commands
                            if (injectCommands && mainModule) {
                                try {
                                    const ptr = mainModule._malloc(msg.commands.byteLength);
                                    mainModule.HEAPU8.set(new Uint8Array(msg.commands), ptr);
                                    injectCommands(ptr, msg.commands.byteLength);
                                    mainModule._free(ptr);
                                } catch (e) {
                                    // Silently ignore if injection fails
                                }
                            }

                            // Log occasionally
                            if (frameCount % 60 === 0) {
                                log(`Frame ${frameCount}: ${msg.commands.byteLength} bytes`, 'info');
                            }
                            break;
                    }
                };

                // Connect to destination
                chuckNode.connect(audioContext.destination);

                log('Audio pipeline connected!', 'success');
                startBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (err) {
                log('Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        function stopAudio() {
            if (chuckNode) {
                chuckNode.disconnect();
                chuckNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            log('Audio stopped');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            runBtn.disabled = true;
        }

        function runCode() {
            if (!chuckNode) {
                log('Audio not started', 'error');
                return;
            }
            const code = codeArea.value;
            log('Running ChucK + ChuGL code...');
            chuckNode.port.postMessage({ type: 'run', code: code });
        }

        startBtn.addEventListener('click', startAudio);
        stopBtn.addEventListener('click', stopAudio);
        runBtn.addEventListener('click', runCode);

        // Try to init main module
        setTimeout(initMainModule, 1000);

        log('Ready. Click "Start Audio" to begin.');
    </script>
</body>
</html>
