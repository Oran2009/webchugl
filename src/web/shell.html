<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChuGL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #status {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: #ccc;
            font-family: monospace;
            font-size: 14px;
            z-index: 5;
        }
        #output {
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            max-height: 30vh;
            overflow-y: auto;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
            white-space: pre-wrap;
        }
        #audio-hint {
            position: fixed;
            bottom: 16px;
            right: 16px;
            color: #888;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            transition: opacity 0.5s;
        }
        #audio-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="status">Loading...</div>
    <!-- <div id="output"></div> -->
    <div id="audio-hint">Click to enable audio</div>

    <script>
        var statusEl = document.getElementById('status');
        // var outputEl = document.getElementById('output');

        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('webglcontextlost', function(e) {
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            print: function(text) {
                console.log(text);
                // outputEl.textContent += text + '\n';
                // Auto-scroll and trim
                // if (outputEl.childNodes.length > 100) {
                //     outputEl.textContent = outputEl.textContent.split('\n').slice(-50).join('\n');
                // }
            },
            printErr: function(text) {
                console.error(text);
            },
            setStatus: function(text) {
                statusEl.textContent = text;
                if (!text) statusEl.style.display = 'none';
            },
            onRuntimeInitialized: function() {
                statusEl.style.display = 'none';
                document.getElementById('canvas').focus();
            },
            // Fetch all files from manifest before main() runs
            // This allows editing code without rebuilding
            preRun: [function() {
                Module.addRunDependency('ck-files');

                // Helper to create parent directories
                function ensureDir(path) {
                    var parts = path.split('/').slice(0, -1);
                    var current = '';
                    for (var i = 0; i < parts.length; i++) {
                        current += '/' + parts[i];
                        try { FS.mkdir(current); } catch(e) {}
                    }
                }

                // Check if file is binary
                function isBinary(filename) {
                    var ext = filename.split('.').pop().toLowerCase();
                    return ['png', 'jpg', 'jpeg', 'gif', 'wav', 'mp3', 'ogg', 'ttf', 'otf', 'woff', 'woff2', 'bin', 'dat'].indexOf(ext) >= 0;
                }

                // Fetch manifest listing all files
                fetch('manifest.json')
                    .then(function(response) {
                        if (!response.ok) throw new Error('Failed to fetch manifest.json');
                        return response.json();
                    })
                    .then(function(manifest) {
                        var files = manifest.files || [];
                        console.log('[WebChuGL] Loading ' + files.length + ' file(s)...');

                        return Promise.all(files.map(function(file) {
                            return fetch(file)
                                .then(function(response) {
                                    if (!response.ok) throw new Error('Failed to fetch ' + file);
                                    return isBinary(file) ? response.arrayBuffer() : response.text();
                                })
                                .then(function(content) {
                                    ensureDir(file);
                                    if (content instanceof ArrayBuffer) {
                                        FS.writeFile('/' + file, new Uint8Array(content));
                                    } else {
                                        FS.writeFile('/' + file, content);
                                    }
                                    var size = content.byteLength || content.length;
                                    console.log('[WebChuGL] Loaded ' + file + ' (' + size + ' bytes)');
                                });
                        }));
                    })
                    .then(function() {
                        Module.removeRunDependency('ck-files');
                    })
                    .catch(function(err) {
                        console.error('[WebChuGL] ' + err.message);
                        statusEl.textContent = 'Failed to load files';
                        statusEl.style.color = '#f44';
                    });
            }]
        };

        // Check WebGPU support
        if (!navigator.gpu) {
            statusEl.textContent = 'WebGPU is not supported in this browser. Please use Chrome or Edge.';
            statusEl.style.color = '#f44';
        }

        // Hide audio hint on user interaction
        var audioHint = document.getElementById('audio-hint');
        var hideAudioHint = function() {
            audioHint.classList.add('hidden');
        };
        document.addEventListener('click', hideAudioHint, { once: true });
        document.addEventListener('keydown', hideAudioHint, { once: true });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
