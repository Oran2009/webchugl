<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ChuGL compiled to WebAssembly. Run ChucK programs with real-time graphics and audio in the browser.">
    <title>WebChuGL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #loading-screen.hidden { display: none; }
        .loading-logo {
            width: 50%;
            height: auto;
            margin-bottom: 32px;
        }
        #loading-logo-dark { display: none; }
        #progress-bar {
            width: 50%;
            height: 2em;
            border: 4px solid #f18e29;
            background: #fff;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: #4f9019;
            transition: width 0.15s;
        }
        @media (prefers-color-scheme: dark) {
            #loading-screen { background: #000; }
            #progress-bar { background: #000; }
            #loading-logo-light { display: none; }
            #loading-logo-dark { display: block; }
        }
        #error-text {
            margin-top: 16px;
            color: #c00;
            font-family: monospace;
            font-size: 14px;
            display: none;
        }
        #output {
            display: none;
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            max-height: 30vh;
            overflow-y: auto;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
            white-space: pre-wrap;
        }
        #audio-hint {
            position: fixed;
            bottom: 16px;
            right: 16px;
            color: #888;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            transition: opacity 0.5s;
        }
        #audio-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <main>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="loading-screen">
        <img id="loading-logo-light" class="loading-logo" src="chugl_logo_light.png" alt="ChuGL" fetchpriority="high">
        <img id="loading-logo-dark" class="loading-logo" src="chugl_logo_dark.png" alt="ChuGL" fetchpriority="high">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="error-text"></div>
    </div>
    <div id="output"></div>
    <div id="audio-hint">Click to enable audio</div>
    </main>

    <script src="coi-serviceworker.js"></script>
    <script src="webchugl.js"></script>
    <script>
        // Check WebGPU support
        if (!navigator.gpu) {
            var errEl = document.getElementById('error-text');
            errEl.textContent = 'WebGPU is not supported in this browser. Please use Chrome or Edge.';
            errEl.style.display = 'block';
        }

        // Hide audio hint on user interaction
        var audioHint = document.getElementById('audio-hint');
        var hideAudioHint = function() {
            audioHint.classList.add('hidden');
        };
        document.addEventListener('click', hideAudioHint, { once: true });
        document.addEventListener('keydown', hideAudioHint, { once: true });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
