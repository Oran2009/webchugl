<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChuGL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #status {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: #ccc;
            font-family: monospace;
            font-size: 64px;
            z-index: 5;
        }
        #output {
            display: none;
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            max-height: 30vh;
            overflow-y: auto;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
            white-space: pre-wrap;
        }
        #audio-hint {
            position: fixed;
            bottom: 16px;
            right: 16px;
            color: #888;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            transition: opacity 0.5s;
        }
        #audio-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="status">Loading...</div>
    <div id="output"></div>
    <div id="audio-hint">Click to enable audio</div>

    <script src="coi-serviceworker.js"></script>
    <script src="jszip.min.js"></script>
    <script src="webchugl.js"></script>
    <script>
        // Check WebGPU support
        if (!navigator.gpu) {
            var statusEl = document.getElementById('status');
            statusEl.textContent = 'WebGPU is not supported in this browser. Please use Chrome or Edge.';
            statusEl.style.color = '#f44';
        }

        // Hide audio hint on user interaction
        var audioHint = document.getElementById('audio-hint');
        var hideAudioHint = function() {
            audioHint.classList.add('hidden');
        };
        document.addEventListener('click', hideAudioHint, { once: true });
        document.addEventListener('keydown', hideAudioHint, { once: true });
    </script>
    {{{ SCRIPT }}}
</body>
</html>
