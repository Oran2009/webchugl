<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebChuGL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #status {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: #ccc;
            font-family: monospace;
            font-size: 14px;
            z-index: 5;
        }
        #output {
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            max-height: 30vh;
            overflow-y: auto;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="status">Loading...</div>
    <div id="output"></div>

    <script>
        var statusEl = document.getElementById('status');
        var outputEl = document.getElementById('output');

        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('webglcontextlost', function(e) {
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            print: function(text) {
                console.log(text);
                outputEl.textContent += text + '\n';
                // Auto-scroll and trim
                if (outputEl.childNodes.length > 100) {
                    outputEl.textContent = outputEl.textContent.split('\n').slice(-50).join('\n');
                }
            },
            printErr: function(text) {
                console.error(text);
            },
            setStatus: function(text) {
                statusEl.textContent = text;
                if (!text) statusEl.style.display = 'none';
            },
            onRuntimeInitialized: function() {
                statusEl.style.display = 'none';
                document.getElementById('canvas').focus();
            },
            // Fetch program.ck from server before main() runs
            // This allows editing program.ck without rebuilding
            preRun: [function() {
                // Add a callback to fetch program.ck before main() executes
                Module.addRunDependency('program.ck');
                fetch('program.ck')
                    .then(function(response) {
                        if (!response.ok) throw new Error('Failed to fetch program.ck: ' + response.status);
                        return response.text();
                    })
                    .then(function(code) {
                        FS.writeFile('/program.ck', code);
                        console.log('[WebChuGL] Loaded program.ck (' + code.length + ' bytes)');
                        Module.removeRunDependency('program.ck');
                    })
                    .catch(function(err) {
                        console.error('[WebChuGL] ' + err.message);
                        statusEl.textContent = 'Failed to load program.ck';
                        statusEl.style.color = '#f44';
                    });
            }]
        };

        // Check WebGPU support
        if (!navigator.gpu) {
            statusEl.textContent = 'WebGPU is not supported in this browser. Please use Chrome or Edge.';
            statusEl.style.color = '#f44';
        }
    </script>
    {{{ SCRIPT }}}
</body>
</html>
