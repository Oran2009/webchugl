    <!-- Back to top button -->
    <script>
    (function() {
        var btn = document.querySelector(".back-to-top");
        window.addEventListener("scroll", function() {
            btn.classList.toggle("visible", window.scrollY > 400);
        }, { passive: true });
        btn.addEventListener("click", function(e) {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    })();
    </script>

    <!-- Hero WebChuGL embed (progressive enhancement) -->
    <script type="module">
    (async function() {
        if (!navigator.gpu) return;
        var canvas = document.getElementById('hero-canvas');
        if (!canvas) return;
        try {
            var mod = await import('../src/webchugl-esm.js');
            var ck = await mod.default.init({
                canvas: canvas,
                whereIsChuGL: '../src/',
                serviceWorker: false,
            });
            canvas.classList.add('ready');
            ck.runCode([
                'GGen sunSystem, earthSystem, moonSystem;',
                'GSphere sun, earth, moon;',
                'for(auto x : [sun, earth, moon]) x.mat().wireframe(true);',
                'GG.scene().ambient(@(.5,.5,.5));',
                'sun.color(Color.YELLOW);',
                'earth.color((Color.SKYBLUE + Color.BLUE) / 2);',
                'moon.color(Color.GRAY);',
                'earthSystem.pos(@(2.2, 0.0, 0.0));',
                'moonSystem.pos(@(.55, 0.0, 0.0));',
                'sun.sca(@(2.0, 2.0, 2.0));',
                'earth.sca(@(0.4, 0.4, 0.4));',
                'moon.sca(@(0.12, 0.12, 0.12));',
                'moonSystem --> earthSystem --> sunSystem --> GG.scene();',
                'sun --> sunSystem; earth --> earthSystem; moon --> moonSystem;',
                'GG.camera().pos(@(0, 5, 7));',
                'GG.camera().lookAt(@(0, 0, 0));',
                '0.0 => float angle;',
                'while(true) {',
                '  GG.nextFrame() => now;',
                '  sunSystem.rotateY(.5 * GG.dt());',
                '  earthSystem.rotateY(.7 * GG.dt());',
                '  sun.rotateY(-1 * GG.dt());',
                '  earth.rotateY(.4 * GG.dt());',
                '  moon.rotateY(.9 * GG.dt());',
                '  .08 * GG.dt() +=> angle;',
                '  GG.camera().pos(@(7*Math.cos(angle), 5, 7*Math.sin(angle)));',
                '  GG.camera().lookAt(@(0, 0, 0));',
                '}',
            ].join('\n'));
        } catch(e) {
            console.log('[webchugl] Hero demo unavailable:', e.message);
        }
    })();
    </script>
