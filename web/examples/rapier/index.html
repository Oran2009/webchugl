<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Physics (Rapier) - WebChuGL</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; outline: none; }
        #controls {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 50; display: flex; gap: 8px; user-select: none;
        }
        #controls button {
            background: rgba(15,15,25,0.9); color: #ccc; border: 1px solid #444;
            border-radius: 5px; padding: 8px 16px; font: 12px monospace;
            cursor: pointer; transition: background .15s, border-color .15s;
        }
        #controls button:hover { background: rgba(30,30,45,0.95); border-color: #888; color: #fff; }
        #status {
            position: fixed; top: 12px; right: 12px; z-index: 50;
            font: 12px monospace; color: #888; text-align: right;
        }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="status">Bodies: 0</div>
    <div id="controls">
        <button id="btn-drop">Drop Box</button>
        <button id="btn-drop5">Drop 5</button>
        <button id="btn-reset">Reset</button>
    </div>
    <script type="module" src="./index.js"></script>
    <script src="../example-nav.js"></script>
</body>
</html>
