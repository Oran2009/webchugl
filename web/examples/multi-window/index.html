<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Window - WebChuGL</title>
    <style>
        * { box-sizing: border-box; margin: 0; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #111; padding: 12px; }

        .grid { display: grid; grid-template-rows: 1fr 1fr; gap: 12px; height: 100%; }
        .pane { background: #1a1a1a; border-radius: 6px; overflow: hidden; min-height: 0; }

        .canvas-wrap { position: relative; width: 100%; height: 100%; background: #000; cursor: crosshair; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="pane">
            <div class="canvas-wrap"><canvas id="canvas-1" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas></div>
        </div>
        <div class="pane">
            <div class="canvas-wrap"><canvas id="canvas-2" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas></div>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
    <script src="../example-nav.js"></script>
</body>
</html>
